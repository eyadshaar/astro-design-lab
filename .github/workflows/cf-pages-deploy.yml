name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      site:
        description: 'Site to deploy'
        required: true
        type: choice
        options:
          - portfolio
          - boutique-hotel
          - ai-automation-agency
          - local-it-cybersecurity
          - food-truck-platform
          - wellness-brand

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./apps/${{ github.event.inputs.site || 'portfolio' }}
        run: npm ci

      - name: Build
        working-directory: ./apps/${{ github.event.inputs.site || 'portfolio' }}
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ github.event.inputs.site || 'portfolio' }}
          directory: apps/${{ github.event.inputs.site || 'portfolio' }}/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
